  <body>
    <script>
      let array = [10, 2, 3, 7, 5, 6, 70, 40];

      function found(arr) {
        let min = arr[0];
        let max = arr[0];
        for (let i = 0; i < arr.length; i++) {
          if (arr[i] > max) {
            max = arr[i];
          }

          if (arr[i] < min) {
            min = arr[i];
          }
        }
        return "min is:" + min + " and max is:" + max;
      }

      //   console.log(found(array));
    </script>
  </body>
